<main class="app">
  <h1>{{ title }}</h1>

  <app-todo-form (add)="onAdd($event)" />

  <h2>Tarefas</h2>

  @if (loading()) {
    <p class="status">Carregando…</p>
  } @else {
    @if (error(); as message) {
      <p class="status error" role="alert">{{ message }}</p>
    }
    <app-todo-list [todos]="todos()" (remove)="onRemove($event)" />
  }
</main>
